<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faça a sua Marcação com Sandra</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root { --disponivel: #2ecc71; --ocupado: #1a365d; --cor-principal: #d4a373; --cor-fundo: #fefae0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--cor-fundo); margin: 0; padding: 15px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); box-sizing: border-box; }
        h1 { text-align: center; color: #4a3728; font-size: 24px; margin-top: 10px; }
        h3 { text-align: center; color: #4a3728; font-size: 18px; margin-top: 20px; border-bottom: 2px solid var(--cor-principal); padding-bottom: 5px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; background-color: #fff; }
        input[type="date"] { cursor: pointer; } 
        
        /* Cor do placeholder cinzento para o select enquanto não for escolhido nada */
        select:invalid, select option[value=""] { color: #888; }
        select option { color: #333; }

        .services-container { max-height: 250px; overflow-y: auto; border: 1px solid #ccc; border-radius: 6px; padding: 10px; background: #fff; display: none; margin-top: 10px; }
        .service-item { display: flex; align-items: center; gap: 10px; padding: 8px 5px; border-bottom: 1px solid #eee; cursor: pointer; }
        .service-item:last-child { border-bottom: none; }
        .service-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; margin: 0; }
        .service-label { font-size: 14.5px; cursor: pointer; user-select: none; }

        .slots-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 20px; }
        .slot { padding: 12px 5px; text-align: center; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 15px; }
        .slot.disponivel { background-color: var(--disponivel); }
        .slot.ocupado { background-color: var(--ocupado); cursor: not-allowed; }
        .slot.selecionado { outline: 3px solid #000; }
        button.submit-btn { background: var(--cor-principal); color: white; border: none; padding: 16px; width: 100%; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; box-sizing: border-box; }
        .legenda { text-align: center; font-size: 13px; margin-bottom: 15px; }
        
        .rgpd-container { display: flex; align-items: center; gap: 10px; margin-top: 20px; background: #f9f9f9; padding: 12px; border-radius: 6px; border: 1px solid #e0e0e0; }
        .rgpd-container input[type="checkbox"] { width: 20px; height: 20px; min-width: 20px; cursor: pointer; margin: 0; -webkit-appearance: checkbox; }
        .rgpd-text { font-size: 12.5px; color: #555; line-height: 1.4; margin: 0; }
    </style>
</head>
<body>
<div class="container">
    <h1>Faça a sua Marcação com Sandra</h1>
    
    <div class="form-group">
        <label for="client-name">Nome:</label>
        <input type="text" id="client-name" placeholder="Ex: Maria Silva" required>
    </div>
    
    <div class="form-group">
        <label for="client-email">E-mail:</label>
        <input type="email" id="client-email" placeholder="Ex: maria.silva@email.com" required>
    </div>
    
    <div class="form-group">
        <label for="client-phone">Número de Telemóvel:</label>
        <input type="tel" id="client-phone" placeholder="Ex: 912345678" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, '')" required>
    </div>
    
    <div class="form-group">
        <label for="category-select">Selecione o Serviço:</label>
        <select id="category-select" onchange="atualizarCategorias()" required>
            <option value="" disabled selected hidden>Ex: Manicure, Pedicure, Depilação...</option>
            <option value="depilacao">Depilação</option>
            <option value="manicure">Manicure</option>
            <option value="pedicure">Pedicure</option>
            <option value="pestanas">Pestanas</option>
        </select>
    </div>

    <div class="form-group" id="gender-group" style="display: none;">
        <label for="gender-select">Tipo de Depilação:</label>
        <select id="gender-select" onchange="mostrarListaServicos()">
            <option value="">-- Selecione o Género --</option>
            <option value="feminino">Feminino</option>
            <option value="masculino">Masculino</option>
        </select>
    </div>

    <div class="form-group">
        <div class="services-container" id="services-list"></div>
    </div>

    <div class="form-group">
        <label for="date">Escolha o Dia:</label>
        <input type="date" id="date" onchange="loadSlots()" onclick="this.showPicker()">
    </div>
    
    <h3>Horários Disponíveis</h3>
    <p class="legenda"><span style="color: var(--disponivel)">■ Verde = Livre</span> | <span style="color: var(--ocupado)">■ Azul = Ocupado</span></p>
    <div class="slots-grid" id="slots-container"></div>
    
    <div class="rgpd-container">
        <input type="checkbox" id="check-rgpd">
        <p class="rgpd-text">Aceito que os meus dados pessoais (nome, telemóvel e e-mail) sejam processados e guardados de forma segura e exclusiva para efeitos de agendamento.</p>
    </div>

    <button class="submit-btn" onclick="confirmBooking()">Confirmar Marcação</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAqi272Nkm5zGYRuS1vda0bGD6MENE9rFc",
        authDomain: "caramelonails-ea9c3.firebaseapp.com",
        databaseURL: "https://caramelonails-ea9c3-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "caramelonails-ea9c3",
        storageBucket: "caramelonails-ea9c3.firebasestorage.app",
        messagingSenderId: "1065202326299",
        appId: "1:1065202326299:web:bb1c139ae24518aeb151be"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const baseServicos = {
        depilacao_feminino: [
            "Depilação Fem: Buço (3€)", "Depilação Fem: Sobrancelhas (4€)", "Depilação Fem: Buço + Sobrancelhas (6€)", 
            "Depilação Fem: Meia perna (8€)", "Depilação Fem: Perna inteira (12€)", "Depilação Fem: Virilha normal (6€)", 
            "Depilação Fem: Virilha total (10€)", "Depilação Fem: Axilas (5€)", "Depilação Fem: Braço ou Glúteo (5€)", 
            "Depilação Fem: DEPILAÇÃO COMPLETA (25€)"
        ],
        depilacao_masculino: [
            "Depilação Masc: Orelha (3€)", "Depilação Masc: Sobrancelhas (3€)", "Depilação Masc: Nariz (3€)", 
            "Depilação Masc: Meia perna (8€)", "Depilação Masc: Perna inteira (12€)", "Depilação Masc: Abdómen (6€)", 
            "Depilação Masc: Tórax (6€)", "Depilação Masc: Costas (10€)", "Depilação Masc: Braço (5€)"
        ],
        manicure: [
            "Manicure: Normal (6€)", "Manicure: Gel c/ extensões (25€)", "Manicure: Manutenção de gel (17€)", 
            "Manicure: Verniz gel (12€)", "Manicure: Cada extensão extra (1€)", "Manicure: Cada unha extra (1.5€)"
        ],
        pedicure: [
            "Pedicure: Corte de unhas simples (6€)", "Pedicure: Corte de unhas difíceis (8€)", "Pedicure: Verniz gel (10€)", 
            "Pedicure: Pedicure normal (15€)", "Pedicure: Pedicure c/ unhas difíceis (18€)", "Pedicure: Pedicure normal c/ verniz gel (23€)"
        ],
        pestanas: [
            "Pestanas: Lifting c/ coloração (25€)", "Pestanas: Lifting (20€)", "Pestanas: Coloração (10€)"
        ]
    };

    const horariosPadrao = ["09:00 - 10:30", "10:30 - 12:00", "12:00 - 13:30", "14:30 - 16:00", "16:00 - 17:30", "17:30 - 19:00", "19:00 - 20:30"];
    let slotsOcupadosDoDia = {};
    let horarioSelecionado = null;

    window.onload = function() {
        let hojeData = new Date();
        let ano = hojeData.getFullYear();
        let mes = String(hojeData.getMonth() + 1).padStart(2, '0');
        let dia = String(hojeData.getDate()).padStart(2, '0');
        let hojeFormatado = `${ano}-${mes}-${dia}`;
        document.getElementById('date').min = hojeFormatado; 
        
        document.getElementById('category-select').value = "";
    };

    function atualizarCategorias() {
        const categoria = document.getElementById('category-select').value;
        const grupoGenero = document.getElementById('gender-group');
        const listaServicos = document.getElementById('services-list');
        
        document.getElementById('gender-select').value = "";
        listaServicos.innerHTML = "";
        listaServicos.style.display = "none";

        if (categoria === "depilacao") {
            grupoGenero.style.display = "block";
        } else {
            grupoGenero.style.display = "none";
            if (categoria !== "") {
                gerarListaCheckboxes(baseServicos[categoria]);
            }
        }
    }

    function mostrarListaServicos() {
        const categoria = document.getElementById('category-select').value;
        const genero = document.getElementById('gender-select').value;
        const listaServicos = document.getElementById('services-list');
        
        listaServicos.innerHTML = "";
        listaServicos.style.display = "none";

        if (categoria === "depilacao" && genero !== "") {
            let chave = "depilacao_" + genero;
            gerarListaCheckboxes(baseServicos[chave]);
        }
    }

    function gerarListaCheckboxes(listaDeItens) {
        const container = document.getElementById('services-list');
        container.innerHTML = "";
        
        listaDeItens.forEach((servico, index) => {
            let div = document.createElement('div');
            div.className = 'service-item';
            
            let checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.value = servico;
            checkbox.id = 'srv-' + index;
            checkbox.onchange = function() { verificarRegrasSelecao(this); };

            let label = document.createElement('label');
            label.className = 'service-label';
            label.htmlFor = 'srv-' + index;
            label.innerHTML = servico;

            div.appendChild(checkbox);
            div.appendChild(label);
            container.appendChild(div);
        });
        
        container.style.display = "block";
    }

    function verificarRegrasSelecao(elementoClicado) {
        const checkboxes = document.querySelectorAll('#services-list input[type="checkbox"]');
        const categoriaPrincipal = document.getElementById('category-select').value;

        if (elementoClicado.checked) {
            let itemAtual = elementoClicado.value;

            if (itemAtual.includes("DEPILAÇÃO COMPLETA")) {
                checkboxes.forEach(cb => { if(cb.value !== itemAtual) cb.checked = false; });
                return;
            }
            checkboxes.forEach(cb => { if(cb.value.includes("DEPILAÇÃO COMPLETA") && cb !== elementoClicado) cb.checked = false; });

            let contagemAtualizada = 0;
            checkboxes.forEach(cb => { if(cb.checked) contagemAtualizada++; });

            if (categoriaPrincipal === "depilacao" && contagemAtualizada > 3) {
                alert("Nas depilações simples, só pode escolher no máximo 3 opções para o mesmo horário!");
                elementoClicado.checked = false;
            } else if (categoriaPrincipal !== "depilacao" && contagemAtualizada > 1) {
                alert("Serviços de Manicure, Pedicure ou Pestanas só podem ser agendados individualmente (1 por horário).");
                elementoClicado.checked = false;
            }
        }
    }

    function loadSlots() {
        const slotsContainer = document.getElementById('slots-container');
        slotsContainer.innerHTML = ''; 
        horarioSelecionado = null;
        const dataSelecionada = document.getElementById('date').value;
        
        if (!dataSelecionada) return;

        let hojeData = new Date();
        hojeData.setHours(0,0,0,0);
        if (new Date(dataSelecionada) < hojeData) {
            alert("Não é possível selecionar uma data anterior ao dia de hoje!");
            document.getElementById('date').value = "";
            return;
        }

        if (new Date(dataSelecionada).getDay() === 0) {
            slotsContainer.innerHTML = "<p style='grid-column: 1/-1; text-align:center; font-weight:bold; color:red;'>Estamos encerrados ao Domingo.</p>";
            return;
        }

        let dataChave = dataSelecionada.replace(/\//g, '-');

        database.ref('slots_ocupados').child(dataChave).on('value', (snapshot) => {
            slotsOcupadosDoDia = snapshot.val() || {};
            desenharQuadrados();
        }, (error) => {
            slotsOcupadosDoDia = {};
            desenharQuadrados();
        });
    }

    function desenharQuadrados() {
        const slotsContainer = document.getElementById('slots-container');
        slotsContainer.innerHTML = '';
        
        horariosPadrao.forEach(horario => {
            let div = document.createElement('div');
            div.className = 'slot';
            div.innerText = horario.split(" - ")[0];
            
            let horaChave = horario.split(' ')[0].replace(':', 'h'); 
            let jaOcupado = slotsOcupadosDoDia[horaChave] === true;

            if (jaOcupado) { 
                div.classList.add('ocupado'); 
            } else {
                div.classList.add('disponivel');
                
                if(horarioSelecionado === horario) {
                    div.classList.add('selecionado');
                }

                div.onclick = function() {
                    document.querySelectorAll('.slot').forEach(s => s.classList.remove('selecionado'));
                    div.classList.add('selecionado'); 
                    horarioSelecionado = horario;
                };
            }
            slotsContainer.appendChild(div);
        });
    }

    function confirmBooking() {
        const nome = document.getElementById('client-name').value.trim();
        const email = document.getElementById('client-email').value.trim();
        const telemovel = document.getElementById('client-phone').value.trim();
        const data = document.getElementById('date').value;
        
        const checkboxes = document.querySelectorAll('#services-list input[type="checkbox"]');
        let servicosSelecionados = [];
        checkboxes.forEach(cb => { if(cb.checked) servicosSelecionados.push(cb.value); });

        const checkRGPD = document.getElementById('check-rgpd');
        const aceitouRGPD = checkRGPD ? checkRGPD.checked : false;

        if (!nome || !email || !telemovel || !data || !horarioSelecionado || servicosSelecionados.length === 0) { 
            alert("Por favor, preencha todos os campos, selecione o(s) serviço(s) e escolha um horário livre!"); 
            return; 
        }

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
            alert("Por favor, insira um endereço de e-mail válido!");
            return;
        }

        if (telemovel.length < 9) {
            alert("Por favor, insira um número de telemóvel válido (mínimo 9 dígitos)!");
            return;
        }
        
        if (!aceitouRGPD) {
            alert("Para efetuar a marcação, precisa de aceitar a caixa de consentimento dos dados (RGPD).");
            return;
        }

        let dataChave = data.replace(/\//g, '-');
        let horaChave = horarioSelecionado.split(' ')[0].replace(':', 'h');
        
        let textoFinalServicos = servicosSelecionados.join(" + ");

        // Transação Firebase: Bloqueia o horário instantaneamente para evitar conflitos concorrentes
        database.ref('slots_ocupados').child(dataChave).child(horaChave).transaction((currentValue) => {
            if (currentValue === true) { return; }
            return true;
        }, (error, committed) => {
            if (error || !committed) {
                alert("Este horário acabou de ser ocupado por outro cliente! Por favor, escolha outro horário.");
                loadSlots();
                return;
            }

            // Grava os dados do cliente de forma isolada e segura
            database.ref('marcacoes_salao').push({ 
                id: Date.now(), 
                nome: nome, 
                email: email, 
                telemovel: telemovel, 
                servico: textoFinalServicos, 
                data: data, 
                horario: horarioSelecionado 
            })
            .then(() => {
                alert("Marcação efetuada com sucesso!");
                
                document.getElementById('client-name').value = '';
                document.getElementById('client-email').value = '';
                document.getElementById('client-phone').value = '';
                document.getElementById('date').value = ''; 
                document.getElementById('category-select').value = '';
                document.getElementById('gender-group').style.display = 'none';
                document.getElementById('services-list').innerHTML = '';
                document.getElementById('services-list').style.display = 'none';
                document.getElementById('check-rgpd').checked = false;
                document.getElementById('slots-container').innerHTML = '';
                horarioSelecionado = null;
            })
            .catch((error) => { 
                alert("Erro ao processar a sua marcação. Tente novamente."); 
                console.error(error); 
            });
        });
    }
</script>
</body>
</html>
